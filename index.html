<!-- drag&drop -->
<script>
const bank = document.getElementById("bank");
const bankArcane = document.getElementById("bank-arcanes");

let draggedItem = null;

// DRAG START
document.addEventListener("dragstart", function (e) {
    if (e.target.tagName === "IMG") {
        draggedItem = e.target;
        setTimeout(() => {
            e.target.style.display = "none";
        }, 0);
    }
});

// DRAG END
document.addEventListener("dragend", function () {
    if (draggedItem) {
        draggedItem.style.display = "block";
        draggedItem = null;
    }
});

// AUTORISER DROP
document.addEventListener("dragover", function (e) {
    e.preventDefault();
});

// DROP
document.addEventListener("drop", function (e) {
    e.preventDefault();
    if (!draggedItem) return;

    const isItem = draggedItem.classList.contains("mod");
    const isArcane = draggedItem.classList.contains("arcane");

    const slot = e.target.closest(".slot");
    const slotArcane = e.target.closest(".slot-arcane");

    /* ==========================
       SYSTEME NORMAL
    ========================== */
    if (isItem && slot) {

        const existingImage = slot.querySelector("img");

        if (existingImage) {
            bank.appendChild(existingImage);
        }

        slot.appendChild(draggedItem);
        return;
    }

    if (isItem && (e.target.id === "bank" || e.target.closest("#bank"))) {
        bank.appendChild(draggedItem);
        return;
    }

    /* ==========================
       SYSTEME ARCANE
    ========================== */
    if (isArcane && slotArcane) {

        const existingImage = slotArcane.querySelector("img");

        if (existingImage) {
            bankArcane.appendChild(existingImage);
        }

        slotArcane.appendChild(draggedItem);
        return;
    }

    if (isArcane && (e.target.id === "bank-arcanes" || e.target.closest("#bank-arcanes"))) {
        bankArcane.appendChild(draggedItem);
        return;
    }
});
</script>

<script>
  // ==============================
// CLICK DROIT → RETOUR EN BANK
// ==============================
document.addEventListener("contextmenu", function (e) {

    const img = e.target;

    if (img.tagName !== "IMG") return;

    const slot = img.closest(".slot");
    const slotArcane = img.closest(".slot-arcane");

    // Si image dans slot normal
    if (slot && img.classList.contains("mod")) {
        e.preventDefault(); // bloque menu clic droit
        bank.appendChild(img);
    }

    // Si image dans slot arcane
    if (slotArcane && img.classList.contains("arcane")) {
        e.preventDefault();
        bankArcane.appendChild(img);
    }

});
</script>
